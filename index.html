<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#0a0f2a">
  <link rel="manifest" href="manifest.json">
  <title>AllNet Advert</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0f2a;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0f2a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.3s ease;
    }

    .logo {
      width: 120px;
      height: 120px;
      background-image: url('https://i.postimg.cc/QM3R8Qh6/Gemini-Generated-Image-z1xlfcz1xlfcz1xl-removebg-preview.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      margin-bottom: 20px;
    }

    .app-title {
      font-size: 24px;
      font-weight: bold;
      color: white;
      margin-bottom: 10px;
    }

    .loader {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 20px;
    }

    .progress-container {
      width: 80%;
      max-width: 280px;
      background-color: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
      height: 6px;
      margin-top: 10px;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background-color: #4c9aff;
      border-radius: 10px;
      transition: width 0.2s ease;
    }

    .content-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: white;
      display: none;
    }
  </style>
</head>
<body>

<div class="splash-screen" id="splashScreen">
  <div class="logo"></div>
  <div class="app-title">AllNet Advert</div>
  <div class="loader">Loading website...</div>
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<iframe class="content-frame" id="contentIframe" src="about:blank"></iframe>

<script>
  const splash = document.getElementById('splashScreen');
  const iframe = document.getElementById('contentIframe');
  const progressBar = document.getElementById('progressBar');

  let progress = 0;
  let interval;
  let loaded = false;

  function updateProgress(value) {
    progressBar.style.width = value + '%';
  }

  function startFakeProgress() {
    interval = setInterval(() => {
      if (loaded) return;
      if (progress < 90) {
        progress += Math.random() * 8;
        if (progress > 90) progress = 90;
        updateProgress(progress);
      }
    }, 200);
  }

  function onIframeLoaded() {
    if (loaded) return;
    loaded = true;
    clearInterval(interval);
    updateProgress(100);
    setTimeout(() => {
      splash.style.opacity = '0';
      setTimeout(() => {
        splash.style.display = 'none';
        iframe.style.display = 'block';
      }, 300);
    }, 300);
  }

  iframe.src = 'https://allnetadvert.com/';
  iframe.addEventListener('load', onIframeLoaded);

  setTimeout(() => {
    if (!loaded) onIframeLoaded();
  }, 10000);

  startFakeProgress();

  // Register Service Worker (PWA)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW registered', reg))
      .catch(err => console.log('SW registration failed', err));
  }
</script>
</body>
</html>
